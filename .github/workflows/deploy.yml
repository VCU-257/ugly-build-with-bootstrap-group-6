mkdir -p .github/workflows && cat <<EOF > .github/workflows/deploy.yml
name: Deploy Vite
on:
  push:
    branches: ["Revert/Iteration1-MovingDistToDocs"]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      - run: npm install && npm run build
        working-directory: ./frontend
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend/dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/deploy-pages@v4
EOF