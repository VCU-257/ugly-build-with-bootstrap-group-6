# Deploy Vite app in /frontend to GitHub Pages.
# After pushing this file, set:
#   Repo → Settings → Pages → Build and deployment → Source: "GitHub Actions"
# Site URL: https://VCU-257.github.io/ugly-build-with-bootstrap-group-6/

name: Deploy to GitHub Pages

on:
  push:
    # Only pushes to these branches trigger a deploy.
    branches:
      - Revert/iteration1

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        run: |
          npm ci
          npm run build
        working-directory: frontend

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
